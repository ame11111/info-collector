<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>涔的信息收集</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#F2F2F7;color:#1C1C1E;min-height:100vh}
        .header{position:fixed;top:0;left:0;right:0;height:56px;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(242,242,247,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid #E5E5EA}
        .header h1{font-size:24px;font-weight:700}
        .header button{background:none;border:none;color:#007AFF;padding:8px;cursor:pointer;font-size:20px}
        .tabs{position:fixed;top:56px;left:0;right:0;height:48px;z-index:90;display:flex;align-items:center;gap:8px;padding:0 16px;overflow-x:auto;background:rgba(242,242,247,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid #E5E5EA;scrollbar-width:none}
        .tabs::-webkit-scrollbar{display:none}
        .tabs button{flex-shrink:0;padding:6px 14px;border-radius:16px;border:1px solid #E5E5EA;background:#fff;font-size:13px;color:#1C1C1E;cursor:pointer;white-space:nowrap}
        .tabs button.on{background:#007AFF;color:#fff;border-color:#007AFF}
        .list{padding:120px 16px 100px;min-height:100vh}
        .empty{text-align:center;padding:60px 20px;color:#8E8E93}
        .empty i{font-size:48px;display:block;margin-bottom:12px;font-style:normal}
        .card-wrap{position:relative;overflow:hidden;border-radius:12px;margin-bottom:10px}
        .card-delete{position:absolute;top:0;right:0;bottom:0;width:80px;background:#FF3B30;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;cursor:pointer}
        .card{position:relative;background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:transform .2s ease;z-index:1}
        .card.swiping{transition:none}
        .card:active{transform:scale(.98)}
        .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .card-cat{font-size:12px;padding:2px 8px;border-radius:8px;background:rgba(0,122,255,.1);color:#007AFF;font-weight:500}
        .card-src{font-size:12px;color:#8E8E93}
        .card-body{font-size:15px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;word-break:break-all}
        .card-bottom{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:#8E8E93}
        .fab{position:fixed;bottom:30px;right:20px;width:56px;height:56px;border-radius:50%;background:#007AFF;color:#fff;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,122,255,.4);cursor:pointer;z-index:100;font-size:32px;line-height:1}
        .fab:active{transform:scale(.9)}
        .modal{position:fixed;top:0;left:0;right:0;bottom:0;z-index:300;background:#F2F2F7;display:none;flex-direction:column}
        .modal.open{display:flex}
        .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid #E5E5EA;min-height:56px}
        .modal-head h2{font-size:17px;font-weight:600}
        .modal-head button{background:none;border:none;color:#007AFF;font-size:16px;cursor:pointer;padding:4px 8px}
        .modal-head .del{color:#FF3B30}
        .modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
        .types{display:flex;gap:10px;margin-bottom:20px}
        .types button{flex:1;padding:12px 8px;border-radius:10px;border:1.5px solid #E5E5EA;background:#fff;font-size:13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
        .types button.on{border-color:#007AFF;background:rgba(0,122,255,.05);color:#007AFF}
        .field{margin-bottom:16px}
        .field textarea,.field input{width:100%;border:1px solid #E5E5EA;border-radius:10px;padding:12px;font-size:15px;background:#fff;resize:none;outline:none;font-family:inherit;margin-bottom:8px}
        .field textarea:focus,.field input:focus{border-color:#007AFF}
        .sel-label{font-size:14px;font-weight:500;color:#8E8E93;margin-bottom:8px;display:block}
        .sel-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
        .sel-group button{padding:6px 14px;border-radius:16px;border:1px solid #E5E5EA;background:#fff;font-size:13px;cursor:pointer}
        .sel-group button.on{background:#007AFF;color:#fff;border-color:#007AFF}
        .sel-group.src button.on{background:#FF9500;border-color:#FF9500}
        .hide{display:none!important}
        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
        .toast.show{opacity:1}
        .detail-text{font-size:16px;line-height:1.7;white-space:pre-wrap;word-break:break-all}
        .detail-meta{margin-top:20px;padding-top:16px;border-top:1px solid #E5E5EA;font-size:13px;color:#8E8E93;display:flex;flex-direction:column;gap:6px}
        .search-input{width:100%;height:40px;border:none;border-radius:10px;background:rgba(118,118,128,.12);padding:0 12px;font-size:16px;outline:none;margin-bottom:16px}
    </style>
</head>
<body>

<header class="header">
    <h1>涔的信息收集</h1>
    <button id="searchBtn">🔍</button>
</header>

<nav class="tabs" id="tabs">
    <button class="on" data-cat="all">全部</button>
    <button data-cat="心理学">心理学</button>
    <button data-cat="计算机">计算机</button>
    <button data-cat="生活">生活</button>
    <button data-cat="做饭">做饭</button>
    <button data-cat="认知">认知</button>
    <button data-cat="音乐">音乐</button>
    <button data-cat="化妆">化妆</button>
    <button data-cat="其他">其他</button>
</nav>

<main class="list" id="list"></main>

<button class="fab" id="addBtn">+</button>

<!-- 搜索 -->
<div class="modal" id="searchModal">
    <div class="modal-head">
        <h2>搜索</h2>
        <button id="searchClose">取消</button>
    </div>
    <div class="modal-body">
        <input type="text" class="search-input" id="searchInput" placeholder="输入关键词搜索...">
        <div id="searchResults"></div>
    </div>
</div>

<!-- 添加 -->
<div class="modal" id="addModal">
    <div class="modal-head">
        <button id="addCancel">取消</button>
        <h2>添加内容</h2>
        <button id="addSave" style="font-weight:600">保存</button>
    </div>
    <div class="modal-body">
        <div class="types" id="typeGroup">
            <button class="on" data-type="text"><span style="font-size:18px">📝</span>文字</button>
            <button data-type="image"><span style="font-size:18px">🖼️</span>截图</button>
            <button data-type="link"><span style="font-size:18px">🔗</span>链接</button>
        </div>
        <div class="field" id="fText"><textarea id="inText" placeholder="粘贴或输入文字内容..." rows="6"></textarea></div>
        <div class="field hide" id="fImage"><textarea id="inImageText" placeholder="图片描述或OCR识别文字..." rows="4"></textarea></div>
        <div class="field hide" id="fLink">
            <input type="url" id="inUrl" placeholder="粘贴链接地址...">
            <input type="text" id="inLinkTitle" placeholder="链接标题（选填）">
            <textarea id="inLinkNote" placeholder="备注说明（选填）" rows="3"></textarea>
        </div>
        <span class="sel-label">选择分类：</span>
        <div class="sel-group" id="catGroup">
            <button data-v="心理学">心理学</button>
            <button data-v="计算机">计算机</button>
            <button data-v="生活">生活</button>
            <button data-v="做饭">做饭</button>
            <button data-v="认知">认知</button>
            <button data-v="音乐">音乐</button>
            <button data-v="化妆">化妆</button>
            <button data-v="其他">其他</button>
        </div>
        <span class="sel-label">来源：</span>
        <div class="sel-group src" id="srcGroup">
            <button data-v="微博">微博</button>
            <button data-v="小红书">小红书</button>
            <button data-v="其他">其他</button>
        </div>
    </div>
</div>

<!-- 详情 -->
<div class="modal" id="detailModal">
    <div class="modal-head">
        <button id="detailClose">关闭</button>
        <h2>详情</h2>
        <button class="del" id="detailDel">删除</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
    var KEY='info_items';
    var items=JSON.parse(localStorage.getItem(KEY)||'[]');
    if(items.length===0){
        items=[
            {id:1,category:'心理学',source:'小红书',type:'text',content:'认知行为疗法核心：情绪不是由事件本身引起，而是由我们对事件的解读引起。改变认知就能改变情绪。',createdAt:'2025-03-20T14:30:00'},
            {id:2,category:'做饭',source:'微博',type:'text',content:'番茄炒蛋秘诀：鸡蛋先炒七分熟盛出，番茄加少许糖去酸，最后合炒不超30秒。',createdAt:'2025-03-19T20:15:00'},
            {id:3,category:'计算机',source:'其他',type:'text',content:'Git速查：git stash暂存修改，git stash pop恢复，git rebase -i HEAD~3合并提交。',createdAt:'2025-03-15T09:42:00'},
            {id:4,category:'认知',source:'小红书',type:'text',content:'费曼学习法：用最简单的语言教给不懂的人。讲不清楚说明没真正理解。',createdAt:'2025-03-14T16:20:00'},
            {id:5,category:'音乐',source:'微博',type:'link',content:'https://bilibili.com/video/BV1xx',title:'即兴伴奏万能和弦1-5-6-4',createdAt:'2025-03-12T11:05:00'},
            {id:6,category:'化妆',source:'小红书',type:'text',content:'画眉三步：1.眉笔从眉尾画轮廓 2.眉粉填充 3.螺旋刷从眉头晕染，眉头要轻！',createdAt:'2025-03-10T22:30:00'},
            {id:7,category:'生活',source:'小红书',type:'text',content:'搬家第一件事：检查插座通电、水管漏水、燃气灶点火。拍照记录损坏发房东确认。',createdAt:'2025-03-09T18:00:00'},
            {id:8,category:'其他',source:'其他',type:'text',content:'护照办理：身份证去出入境管理局，拍照填表缴费160元，7个工作日取。',createdAt:'2025-03-06T14:50:00'}
        ];
        save();
    }
    var nextId=Math.max.apply(null,items.map(function(i){return i.id}))+1;
    var curCat='all';
    var curType='text';
    var selCat='';
    var selSrc='';
    var detailId=null;

    function save(){localStorage.setItem(KEY,JSON.stringify(items));}

    function fmt(s){
        var d=new Date(s),now=new Date(),diff=now-d;
        if(diff<60000)return'刚刚';
        if(diff<3600000)return Math.floor(diff/60000)+'分钟前';
        var hm=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
        if(d.toDateString()===now.toDateString())return'今天 '+hm;
        var y=new Date(now);y.setDate(y.getDate()-1);
        if(d.toDateString()===y.toDateString())return'昨天 '+hm;
        return(d.getMonth()+1)+'月'+d.getDate()+'日 '+hm;
    }

    var icons={text:'📝',image:'🖼️',link:'🔗'};

    function cardHtml(item){
        var body=item.content||'';
        if(item.type==='link'&&item.title)body=item.title+' - '+item.content;
        return'<div class="card-wrap" data-id="'+item.id+'"><div class="card-delete">删除</div><div class="card"><div class="card-top"><span class="card-cat">'+item.category+'</span><span class="card-src">'+(item.source||'')+'</span></div><div class="card-body">'+body+'</div><div class="card-bottom"><span>'+(icons[item.type]||'📄')+'</span><span>'+fmt(item.createdAt)+'</span></div></div></div>';
    }

    function render(){
        var arr=curCat==='all'?items.slice():items.filter(function(i){return i.category===curCat;});
        arr.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});
        var el=document.getElementById('list');
        if(arr.length===0){
            el.innerHTML='<div class="empty"><i>📋</i><p>该分类下暂无内容</p><p style="font-size:14px;margin-top:8px;color:#8E8E93">点击右下角 + 开始收集</p></div>';
        }else{
            el.innerHTML=arr.map(cardHtml).join('');
        }
        bindSwipe();
    }
    render();

    function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}

    // ===== 滑动删除 =====
    function bindSwipe(){
        var wraps=document.querySelectorAll('.card-wrap');
        wraps.forEach(function(wrap){
            var card=wrap.querySelector('.card');
            var deleteBtn=wrap.querySelector('.card-delete');
            var startX=0,currentX=0,isDragging=false,isOpen=false;

            card.addEventListener('touchstart',function(e){
                startX=e.touches[0].clientX;
                currentX=0;
                isDragging=true;
                card.classList.add('swiping');
            },{passive:true});

            card.addEventListener('touchmove',function(e){
                if(!isDragging)return;
                var diff=e.touches[0].clientX-startX;
                if(isOpen){
                    diff=diff-80;
                }
                if(diff>0)diff=0;
                if(diff<-80)diff=-80;
                currentX=diff;
                card.style.transform='translateX('+currentX+'px)';
            },{passive:true});

            card.addEventListener('touchend',function(){
                isDragging=false;
                card.classList.remove('swiping');
                if(currentX<-40){
                    card.style.transform='translateX(-80px)';
                    isOpen=true;
                }else{
                    card.style.transform='translateX(0)';
                    isOpen=false;
                }
            });

            // 鼠标支持（PC端测试）
            card.addEventListener('mousedown',function(e){
                startX=e.clientX;
                currentX=0;
                isDragging=true;
                card.classList.add('swiping');
                e.preventDefault();
            });

            document.addEventListener('mousemove',function(e){
                if(!isDragging)return;
                var diff=e.clientX-startX;
                if(isOpen){
                    diff=diff-80;
                }
                if(diff>0)diff=0;
                if(diff<-80)diff=-80;
                currentX=diff;
                card.style.transform='translateX('+currentX+'px)';
            });

            document.addEventListener('mouseup',function(){
                if(!isDragging)return;
                isDragging=false;
                card.classList.remove('swiping');
                if(currentX<-40){
                    card.style.transform='translateX(-80px)';
                    isOpen=true;
                }else{
                    card.style.transform='translateX(0)';
                    isOpen=false;
                }
            });

            // 点击删除按钮
            deleteBtn.addEventListener('click',function(){
                var id=parseInt(wrap.dataset.id);
                wrap.style.transition='all .3s';
                wrap.style.transform='translateX(-100%)';
                wrap.style.opacity='0';
                wrap.style.maxHeight=wrap.offsetHeight+'px';
                setTimeout(function(){
                    wrap.style.maxHeight='0';
                    wrap.style.marginBottom='0';
                    wrap.style.padding='0';
                },50);
                setTimeout(function(){
                    items=items.filter(function(i){return i.id!==id;});
                    save();
                    showToast('已删除');
                    render();
                },350);
            });

            // 点击卡片（非滑动时）打开详情
            card.addEventListener('click',function(){
                if(isOpen){
                    card.style.transform='translateX(0)';
                    isOpen=false;
                    return;
                }
            });
        });
    }

    // 标签筛选
    document.getElementById('tabs').addEventListener('click',function(e){
        var btn=e.target.closest('button');
        if(!btn)return;
        document.querySelectorAll('.tabs button').forEach(function(b){b.classList.remove('on');});
        btn.classList.add('on');
        curCat=btn.dataset.cat;
        render();
    });

    // 添加弹窗
    document.getElementById('addBtn').addEventListener('click',function(){
        resetForm();
        document.getElementById('addModal').classList.add('open');
        document.body.style.overflow='hidden';
    });

    document.getElementById('addCancel').addEventListener('click',closeAdd);

    function closeAdd(){
        document.getElementById('addModal').classList.remove('open');
        document.body.style.overflow='';
    }

    function resetForm(){
        curType='text';selCat='';selSrc='';
        document.getElementById('inText').value='';
        document.getElementById('inImageText').value='';
        document.getElementById('inUrl').value='';
        document.getElementById('inLinkTitle').value='';
        document.getElementById('inLinkNote').value='';
        document.querySelectorAll('#typeGroup button').forEach(function(b){b.classList.remove('on');});
        document.querySelector('#typeGroup button[data-type="text"]').classList.add('on');
        document.getElementById('fText').classList.remove('hide');
        document.getElementById('fImage').classList.add('hide');
        document.getElementById('fLink').classList.add('hide');
        document.querySelectorAll('#catGroup button').forEach(function(b){b.classList.remove('on');});
        document.querySelectorAll('#srcGroup button').forEach(function(b){b.classList.remove('on');});
    }

    // 类型切换
    document.getElementById('typeGroup').addEventListener('click',function(e){
        var btn=e.target.closest('button');
        if(!btn)return;
        document.querySelectorAll('#typeGroup button').forEach(function(b){b.classList.remove('on');});
        btn.classList.add('on');
        curType=btn.dataset.type;
        document.getElementById('fText').classList.toggle('hide',curType!=='text');
        document.getElementById('fImage').classList.toggle('hide',curType!=='image');
        document.getElementById('fLink').classList.toggle('hide',curType!=='link');
    });

    // 分类选择
    document.getElementById('catGroup').addEventListener('click',function(e){
        var btn=e.target.closest('button');
        if(!btn)return;
        document.querySelectorAll('#catGroup button').forEach(function(b){b.classList.remove('on');});
        btn.classList.add('on');
        selCat=btn.dataset.v;
    });

    // 来源选择
    document.getElementById('srcGroup').addEventListener('click',function(e){
        var btn=e.target.closest('button');
        if(!btn)return;
        document.querySelectorAll('#srcGroup button').forEach(function(b){b.classList.remove('on');});
        btn.classList.add('on');
        selSrc=btn.dataset.v;
    });

    // 保存
    document.getElementById('addSave').addEventListener('click',function(){
        if(!selCat){showToast('请选择分类');return;}
        var item={id:nextId++,type:curType,category:selCat,source:selSrc||'其他',createdAt:new Date().toISOString()};
        if(curType==='text'){
            var t=document.getElementById('inText').value.trim();
            if(!t){showToast('请输入内容');return;}
            item.content=t;
        }else if(curType==='image'){
            var t2=document.getElementById('inImageText').value.trim();
            if(!t2){showToast('请输入图片描述');return;}
            item.content=t2;
        }else if(curType==='link'){
            var url=document.getElementById('inUrl').value.trim();
            if(!url){showToast('请输入链接');return;}
            item.content=url;
            item.title=document.getElementById('inLinkTitle').value.trim();
            item.note=document.getElementById('inLinkNote').value.trim();
        }
        items.push(item);
        save();
        showToast('保存成功');
        closeAdd();
        render();
    });

    // 点击卡片看详情（事件委托）
    document.getElementById('list').addEventListener('click',function(e){
        // 如果点的是删除按钮，不触发详情
        if(e.target.closest('.card-delete'))return;
        var wrap=e.target.closest('.card-wrap');
        if(!wrap)return;
        var card=wrap.querySelector('.card');
        // 如果卡片处于滑开状态，点击收回而不是打开详情
        var transform=card.style.transform;
        if(transform&&transform.indexOf('-80')!==-1)return;
        var id=parseInt(wrap.dataset.id);
        var item=items.find(function(i){return i.id===id;});
        if(!item)return;
        detailId=id;
        var html='<div class="detail-text">'+item.content+'</div>';
        if(item.type==='link'){
            html='<a href="'+item.content+'" target="_blank" style="color:#007AFF;word-break:break-all">'+item.content+'</a>';
            if(item.title)html+='<h3 style="margin-top:12px">'+item.title+'</h3>';
            if(item.note)html+='<div class="detail-text" style="margin-top:12px">'+item.note+'</div>';
        }
        html+='<div class="detail-meta"><span>分类：'+item.category+'</span><span>来源：'+(item.source||'未标记')+'</span><span>时间：'+fmt(item.createdAt)+'</span><span>类型：'+({text:'文字',image:'截图',link:'链接'}[item.type])+'</span></div>';
        document.getElementById('detailBody').innerHTML=html;
        document.getElementById('detailModal').classList.add('open');
        document.body.style.overflow='hidden';
    });

    document.getElementById('detailClose').addEventListener('click',function(){
        document.getElementById('detailModal').classList.remove('open');
        document.body.style.overflow='';
    });

    // 详情页删除
    document.getElementById('detailDel').addEventListener('click',function(){
        if(!detailId)return;
        if(!confirm('确定删除？'))return;
        items=items.filter(function(i){return i.id!==detailId;});
        save();
        showToast('已删除');
        document.getElementById('detailModal').classList.remove('open');
        document.body.style.overflow='';
        detailId=null;
        render();
    });

    // 搜索
    document.getElementById('searchBtn').addEventListener('click',function(){
        document.getElementById('searchModal').classList.add('open');
        document.getElementById('searchInput').value='';
        document.getElementById('searchResults').innerHTML='';
        setTimeout(function(){document.getElementById('searchInput').focus();},100);
    });

    document.getElementById('searchClose').addEventListener('click',function(){
        document.getElementById('searchModal').classList.remove('open');
    });

    var timer=null;
    document.getElementById('searchInput').addEventListener('input',function(){
        clearTimeout(timer);
        var self=this;
        timer=setTimeout(function(){
            var kw=self.value.trim().toLowerCase();
            if(!kw){document.getElementById('searchResults').innerHTML='';return;}
            var res=items.filter(function(i){return(i.content||'').toLowerCase().indexOf(kw)!==-1||(i.title||'').toLowerCase().indexOf(kw)!==-1||(i.category||'').toLowerCase().indexOf(kw)!==-1;});
            if(res.length===0){
                document.getElementById('searchResults').innerHTML='<div class="empty"><p>没有找到相关内容</p></div>';
            }else{
                document.getElementById('searchResults').innerHTML=res.map(cardHtml).join('');
            }
        },300);
    });

    document.getElementById('searchResults').addEventListener('click',function(e){
        if(e.target.closest('.card-delete'))return;
        var wrap=e.target.closest('.card-wrap');
        if(!wrap)return;
        var id=parseInt(wrap.dataset.id);
        var item=items.find(function(i){return i.id===id;});
        if(!item)return;
        document.getElementById('searchModal').classList.remove('open');
        detailId=id;
        var html='<div class="detail-text">'+item.content+'</div><div class="detail-meta"><span>分类：'+item.category+'</span><span>来源：'+(item.source||'')+'</span><span>时间：'+fmt(item.createdAt)+'</span></div>';
        document.getElementById('detailBody').innerHTML=html;
        document.getElementById('detailModal').classList.add('open');
        document.body.style.overflow='hidden';
    });
})();
</script>
</body>
</html>
